version: 2

builds:
  - binary: target
    id: target
    ldflags:
      - "-X github.com/netdata-be/target-cli/cmd.version={{.Version}}"
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -mod=vendor

release:
  prerelease: auto

universal_binaries:
  - ids:
      - target
    replace: true

homebrew_casks:
  -
    name: target
    directory: Casks
    homepage: "https://github.com/netdata-be/target-cli"
    repository:
      owner: netdata-be
      name: homebrew-tap
    commit_author:
      name: netdata-be
      email: wouter@netdata.be
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    license: "MIT"
checksum:
  name_template: 'checksums.txt'